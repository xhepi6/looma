services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - APP_ENV=dev
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=sqlite+aiosqlite:////data/app.db
      - CORS_ORIGINS=http://localhost:${WEB_PORT:-5173},http://localhost:${API_PORT:-8000},http://127.0.0.1:${WEB_PORT:-5173}
      - SEED_ADMIN_USERS=true
      - SEED_USER_1_USERNAME=${SEED_USER_1_USERNAME:-alice}
      - SEED_USER_1_PASSWORD=${SEED_USER_1_PASSWORD:-password123}
      - SEED_USER_2_USERNAME=${SEED_USER_2_USERNAME:-bob}
      - SEED_USER_2_PASSWORD=${SEED_USER_2_PASSWORD:-password123}
    volumes:
      - sqlite_data:/data
    networks:
      - looma-local
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - looma-local
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:

networks:
  looma-local:
    driver: bridge
