services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=prod
      - APP_SECRET_KEY=${APP_SECRET_KEY:-super-secret-key-change-in-production}
      - DATABASE_URL=sqlite+aiosqlite:////data/app.db
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - SEED_ADMIN_USERS=true
      - SEED_USER_1_USERNAME=${SEED_USER_1_USERNAME:-alice}
      - SEED_USER_1_PASSWORD=${SEED_USER_1_PASSWORD:-password123}
      - SEED_USER_2_USERNAME=${SEED_USER_2_USERNAME:-bob}
      - SEED_USER_2_PASSWORD=${SEED_USER_2_PASSWORD:-password123}
      - NTFY_USERNAME=${NTFY_USERNAME:-}
      - NTFY_PASSWORD=${NTFY_PASSWORD:-}
    volumes:
      - sqlite_data:/data
    networks:
      - proxy_network
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - proxy_network
    restart: unless-stopped

volumes:
  sqlite_data:

networks:
  proxy_network:
    external: true
